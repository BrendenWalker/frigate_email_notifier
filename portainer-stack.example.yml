# Example Portainer stack for Frigate Email Notifier
#
# Deploy in Portainer:
#   Stacks -> Add stack -> Web editor (or Git repository)
#
# If using Git, set "Compose path" to: portainer-stack.example.yml
#
# Uses host networking so the container shares the host's network stack.
# Set MQTT_HOST to a hostname or IP the *host* can resolve (e.g. 127.0.0.1,
# localhost, or a LAN hostname). Service names from other Docker stacks will
# NOT resolve unless you use the external-network option below instead.
#
# In Portainer "Environment variables", define at least:
#   SMTP_HOST, SMTP_USER, SMTP_PASS, SMTP_FROM, SMTP_TO
# Optional: MQTT_HOST (defaults to 127.0.0.1), IMAGE_TAG, MQTT_PORT,
#           MQTT_USER, MQTT_PASS, ALERT_START_HOUR, ALERT_END_HOUR,
#           EXCLUDED_LABELS, TZ
#
# Alternative: if your MQTT broker runs in another Compose stack, comment out
# network_mode: host, uncomment the networks section on the service and the
# external mqtt network below, and set MQTT_HOST to that broker's service name.

services:
  frigate-email-notifier:
    image: derpmhichurp/frigate_email_notifier:${IMAGE_TAG:-latest}
    container_name: frigate-email-notifier
    network_mode: host
    restart: unless-stopped
    environment:
      MQTT_HOST: ${MQTT_HOST:-127.0.0.1}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASS: ${MQTT_PASS:-}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-frigate}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      ALERT_START_HOUR: ${ALERT_START_HOUR:-19}
      ALERT_END_HOUR: ${ALERT_END_HOUR:-7}
      EXCLUDED_LABELS: ${EXCLUDED_LABELS:-bird}
      TZ: ${TZ:-UTC}
    # networks:
    #   - frigate-email-notifier
    #   - mqtt

# networks:
#   frigate-email-notifier:
#     driver: bridge
#
#   # Uncomment to reach a broker on an existing Docker network (e.g. Mosquitto):
#   # mqtt:
